services:
  gateway:
    build: .
    container_name: embed-reranker-gateway
    restart: unless-stopped
    ports:
      - "${PORT:-3999}:3000"
    environment:
      # ── 服務端點 ─────────────────────────────────────────
      EMBED_URL: "${EMBED_URL:-http://infinity:8000}"
      RERANK_URL: "${RERANK_URL:-http://infinity:8000}"
      # ── 佇列與效能 ──────────────────────────────────────
      CONCURRENCY: "${CONCURRENCY:-2}"
      TIMEOUT_MS: "${TIMEOUT_MS:-30000}"
      MAX_RETRIES: "${MAX_RETRIES:-2}"
      # ── RAM 管理 ────────────────────────────────────────
      MAX_BATCH_SIZE: "${MAX_BATCH_SIZE:-64}"
      MAX_DOCUMENTS: "${MAX_DOCUMENTS:-1024}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - inference

networks:
  inference:
    driver: bridge
